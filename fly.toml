# Fly.io — ktx-mcp (MCP HTTP + sync endpoint)
# https://fly.io/docs/reference/configuration/

app = 'ktx-mcp'
primary_region = 'nrt'

[build]
  dockerfile = 'Dockerfile'

[env]
  KTX_MCP_TRANSPORT = 'http'
  KTX_MCP_PORT = '8080'
  KTX_MCP_DEFAULT_LOCALE = 'en'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
